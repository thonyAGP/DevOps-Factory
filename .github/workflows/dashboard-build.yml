name: Build Dashboard

on:
  schedule:
    # Every 6 hours (reduced from 4h to save API quota)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs: {}
  # Also run after scan completes
  workflow_run:
    workflows: ['Scan Repos']
    types: [completed]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FACTORY_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm dashboard
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: 'true'

      - name: Security posture report
        run: pnpm security-posture
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: Template drift detection
        run: pnpm template-drift
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: DORA metrics
        run: pnpm dora
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: CI cost monitor
        run: pnpm cost-monitor
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: Compliance report
        run: pnpm compliance
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: Smart recommendations
        run: pnpm recommendations
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        continue-on-error: true

      - name: Check for alerts
        id: alerts
        run: |
          if [ -f dashboard/alert-payload.json ]; then
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
            ALERT_COUNT=$(jq '.alerts | length' dashboard/alert-payload.json)
            echo "alert_count=$ALERT_COUNT" >> "$GITHUB_OUTPUT"
            ALERT_SUMMARY=$(jq -r '.alerts[] | "- [\(.type)] \(.message)"' dashboard/alert-payload.json)
            {
              echo "alert_body<<EOF"
              echo "$ALERT_SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger self-healing for CI failures (max 1 per run, deduplicated)
        if: steps.alerts.outputs.has_alerts == 'true'
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
        run: |
          # Limited to 1 per run to prevent workflow spam and excessive API quota usage
          MAX_TRIGGERS=1
          TRIGGERED=0
          SEEN_REPOS=""

          jq -c '.alerts[] | select(.type == "ci_fail" and .runId != "")' dashboard/alert-payload.json | while read -r alert; do
            [ "$TRIGGERED" -ge "$MAX_TRIGGERS" ] && echo "Rate limit: skipping remaining alerts" && break

            REPO=$(echo "$alert" | jq -r '.repo')

            # Deduplicate: 1 self-heal per repo per run
            if echo "$SEEN_REPOS" | grep -qxF "$REPO"; then
              echo "  Skipping duplicate trigger for $REPO"
              continue
            fi
            SEEN_REPOS="$SEEN_REPOS
          $REPO"

            RUN_ID=$(echo "$alert" | jq -r '.runId')
            echo "Triggering self-heal for $REPO (run $RUN_ID) [$((TRIGGERED+1))/$MAX_TRIGGERS]"
            gh workflow run self-heal.yml -f repo="$REPO" -f run_id="$RUN_ID" || echo "  Failed to trigger"
            TRIGGERED=$((TRIGGERED+1))
          done

      - name: Suppress first-time alerts (grace period for self-heal)
        id: alert_filter
        run: |
          TRACKER="data/alert-tracker.json"
          CURRENT="dashboard/alert-payload.json"

          if [ ! -f "$CURRENT" ]; then
            echo "should_email=false" >> "$GITHUB_OUTPUT"
            # No alerts → clear tracker
            echo '[]' > "$TRACKER"
            exit 0
          fi

          # Current alert keys (type:project)
          CURRENT_KEYS=$(jq -r '.alerts[] | "\(.type):\(.project)"' "$CURRENT" | sort)

          SHOULD_EMAIL=false
          if [ -f "$TRACKER" ]; then
            PREV_KEYS=$(jq -r '.[] | "\(.type):\(.project)"' "$TRACKER" 2>/dev/null || echo "")
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              if echo "$PREV_KEYS" | grep -qxF "$key"; then
                SHOULD_EMAIL=true
                echo "  [REPEAT] $key → will notify"
              else
                echo "  [NEW] $key → suppressed (self-heal in progress)"
              fi
            done <<< "$CURRENT_KEYS"
          else
            echo "  First alert detection → suppressing email, self-heal triggered"
          fi

          echo "should_email=$SHOULD_EMAIL" >> "$GITHUB_OUTPUT"

          # Save current alerts as tracker for next run
          jq '[.alerts[] | {type, project}]' "$CURRENT" > "$TRACKER"

      - name: Remove transient alert file
        run: rm -f dashboard/alert-payload.json

      - name: Commit dashboard
        run: |
          git config user.name "DevOps Factory Bot"
          git config user.email "devops-factory[bot]@users.noreply.github.com"
          git add dashboard/ data/activity-log.json data/alert-tracker.json
          git diff --cached --quiet || git commit -m "chore: update dashboard"

          # Try simple pull --rebase first
          if git pull --rebase --autostash; then
            git push
            exit 0
          fi

          # Rebase failed (likely conflict on activity-log.json)
          # Abort rebase, take a different approach
          git rebase --abort 2>/dev/null || true
          git stash pop 2>/dev/null || true

          # Save our generated files
          cp -r dashboard/ /tmp/dashboard-backup/
          cp data/activity-log.json /tmp/activity-log-backup.json 2>/dev/null || true
          cp data/alert-tracker.json /tmp/alert-tracker-backup.json 2>/dev/null || true

          # Hard reset to remote and re-apply our files
          git fetch origin master
          git reset --hard origin/master

          # Restore generated files
          cp -r /tmp/dashboard-backup/* dashboard/
          cp /tmp/activity-log-backup.json data/activity-log.json 2>/dev/null || true
          cp /tmp/alert-tracker-backup.json data/alert-tracker.json 2>/dev/null || true

          # Re-commit and push
          git add dashboard/ data/activity-log.json data/alert-tracker.json
          git diff --cached --quiet || git commit -m "chore: update dashboard"
          git push
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}

      - name: Check if daily digest should be sent
        id: digest_gate
        if: steps.alert_filter.outputs.should_email == 'true'
        run: |
          HOUR=$(date -u +%H)
          LAST_SENT_FILE="data/last-email-digest.txt"
          TODAY=$(date -u +%Y-%m-%d)

          # Only send between 7-9 UTC, and max once per day
          if [ "$HOUR" -lt 7 ] || [ "$HOUR" -gt 9 ]; then
            echo "Outside digest window (${HOUR}h UTC) - skipping email"
            echo "send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f "$LAST_SENT_FILE" ] && [ "$(cat "$LAST_SENT_FILE")" = "$TODAY" ]; then
            echo "Digest already sent today ($TODAY) - skipping"
            echo "send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "send=true" >> "$GITHUB_OUTPUT"
          echo "$TODAY" > "$LAST_SENT_FILE"
          git add "$LAST_SENT_FILE"

      - name: Send daily digest email
        if: steps.digest_gate.outputs.send == 'true' && env.SMTP_USER != ''
        env:
          SMTP_USER: ${{ secrets.SMTP_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'DevOps Factory Daily Digest - ${{ steps.alerts.outputs.alert_count }} issue(s)'
          to: ${{ secrets.ALERT_EMAIL }}
          from: DevOps Factory <${{ secrets.SMTP_USERNAME }}>
          body: |
            DevOps Factory Daily Digest (${{ steps.alerts.outputs.alert_count }} persistent alerts):

            ${{ steps.alerts.outputs.alert_body }}

            Dashboard: https://thonyagp.github.io/DevOps-Factory/

            (This digest is sent max once per day at ~8h UTC)

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.FACTORY_PAT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - id: deployment
        uses: actions/deploy-pages@v4
