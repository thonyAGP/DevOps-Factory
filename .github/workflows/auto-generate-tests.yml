name: Auto-Generate Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max files to process'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        type: boolean
        default: false

  # Weekly schedule - Monday 2am
  schedule:
    - cron: '0 2 * * 1'

  # On PR to main (optional - can be enabled later)
  # pull_request:
  #   branches: [main, master]

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run auto-generate-tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            pnpm auto-generate-tests -- --limit ${{ github.event.inputs.limit || '10' }} --dry-run --no-commit
          else
            pnpm auto-generate-tests -- --limit ${{ github.event.inputs.limit || '10' }} --no-commit
          fi

      - name: Check for generated tests
        id: check_tests
        run: |
          if [ -n "$(git status --porcelain scripts/*.test.ts 2>/dev/null)" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "✅ Tests generated"
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No tests generated"
          fi

      - name: Create Pull Request
        if: steps.check_tests.outputs.has_tests == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            test: auto-generate tests via GitHub Actions

            Generated by DevOps-Factory auto-generate-tests workflow.
            All tests validated and passing.
          branch: auto-tests/${{ github.run_number }}
          delete-branch: true
          title: 'test: auto-generate missing unit tests'
          body: |
            ## 🤖 Auto-Generated Tests

            This PR was automatically created by the DevOps-Factory test generator.

            ### What Changed

            - ✅ Generated unit tests for files with 0% coverage
            - ✅ All tests validated (executed and passed)
            - ✅ TypeScript compilation clean

            ### Review Checklist

            - [ ] Review generated test quality
            - [ ] Verify tests cover important edge cases
            - [ ] Check test naming conventions
            - [ ] Ensure no false positives

            ### Cost

            API cost tracked in commit message.

            ---

            🤖 Generated by [DevOps-Factory](https://github.com/${{ github.repository }})

          labels: |
            automated
            tests
            devops-factory

      - name: Summary
        run: |
          echo "### Test Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_tests.outputs.has_tests }}" = "true" ]; then
            echo "✅ Tests generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A pull request has been created with the generated tests." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No tests to generate - all files already have tests" >> $GITHUB_STEP_SUMMARY
          fi
