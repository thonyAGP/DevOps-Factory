# DevOps-Factory: Cron Job Monitor (AUTO-89)
# Pings a monitoring endpoint after each scheduled workflow succeeds
# Uses Healthchecks.io (free: 20 checks) or any HTTP ping endpoint
# Configure HEALTHCHECK_PING_URL secret per repo

name: Cron Monitor

on:
  workflow_run:
    workflows: ['*']
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  ping:
    if: >
      github.event.workflow_run.event == 'schedule' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping monitoring endpoint
        if: ${{ secrets.HEALTHCHECK_PING_URL != '' }}
        env:
          HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          STATUS="${{ github.event.workflow_run.conclusion }}"

          curl -fsS -m 10 \
            --retry 3 \
            --retry-delay 5 \
            "${HEALTHCHECK_PING_URL}" \
            --data-raw "Workflow: ${WORKFLOW} | Status: ${STATUS}" \
            || echo "Warning: ping failed but not blocking"

          echo "Pinged monitoring for: ${WORKFLOW} (${STATUS})"

      - name: No-op when unconfigured
        if: ${{ secrets.HEALTHCHECK_PING_URL == '' }}
        run: echo "HEALTHCHECK_PING_URL not configured - skipping ping"

  report-failure:
    if: >
      github.event.workflow_run.event == 'schedule' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping failure endpoint
        if: ${{ secrets.HEALTHCHECK_PING_URL != '' }}
        env:
          HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"

          curl -fsS -m 10 \
            --retry 3 \
            "${HEALTHCHECK_PING_URL}/fail" \
            --data-raw "FAILED: ${WORKFLOW}" \
            || echo "Warning: failure ping failed"

          echo "::warning::Scheduled workflow '${WORKFLOW}' failed"

      - name: Log failed cron to daily digest issue
        uses: actions/github-script@v7
        with:
          script: |
            const workflow = '${{ github.event.workflow_run.name }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            const date = new Date().toISOString().split('T')[0];

            // Skip DevOps-Factory monitoring workflows to avoid cascade
            const monitoringWorkflows = ['Cron Monitor', 'Stale Bot', 'Label Sync', 'Factory Watchdog', 'Uptime Monitor', 'Build Dashboard'];
            if (monitoringWorkflows.includes(workflow)) {
              console.log(`Skipping issue for monitoring workflow: ${workflow}`);
              return;
            }

            // Use a single daily digest issue instead of one issue per workflow
            const digestTitle = `Cron failures digest - ${date}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cron-failure',
              state: 'open',
            });

            const digestIssue = issues.find(i => i.title === digestTitle);
            const entry = `- **${workflow}** failed at ${new Date().toISOString().slice(11,19)} UTC ([run](${runUrl}))`;

            if (digestIssue) {
              // Rate limit: check if we already logged this workflow today
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: digestIssue.number,
              });
              const alreadyLogged = comments.data.some(c => c.body.includes(workflow) && c.body.includes(runUrl));
              if (alreadyLogged) {
                console.log(`Already logged ${workflow} failure in digest`);
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: digestIssue.number,
                body: entry,
              });
            } else {
              // Close old digest issues from previous days
              for (const old of issues.filter(i => i.title.startsWith('Cron failures digest -') && i.title !== digestTitle)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: old.number,
                  state: 'closed',
                });
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: digestTitle,
                body: `## Cron Failures - ${date}\n\n${entry}\n\n---\n*New failures are added as comments. This issue auto-closes the next day.*`,
                labels: ['cron-failure', 'automated'],
              });
            }
