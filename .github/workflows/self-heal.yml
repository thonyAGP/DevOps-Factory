name: Self-Heal CI

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repository (owner/name)'
        required: true
        type: string
      run_id:
        description: 'Failed workflow run ID'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run self-healing analysis
        run: pnpm self-heal -- --repo "${{ inputs.repo }}" --run-id "${{ inputs.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

      - name: Commit pattern DB updates
        run: |
          git config user.name "DevOps Factory Bot"
          git config user.email "devops-factory[bot]@users.noreply.github.com"
          git add data/patterns.json data/self-heal-cooldown.json
          git diff --cached --quiet || git commit -m "chore: update self-heal patterns" --no-verify
          git pull --rebase --autostash || true
          git push || true
        env:
          GH_TOKEN: ${{ secrets.FACTORY_PAT }}
