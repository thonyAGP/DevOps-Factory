# DevOps-Factory: Auto-merge dependency updates
# Auto-merges minor/patch Dependabot & Renovate PRs when CI passes
# Major updates require manual review

name: Auto-merge Dependencies

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') &&
      !contains(github.event.pull_request.title, 'major')
    steps:
      - name: Dependabot metadata
        if: github.actor == 'dependabot[bot]'
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if auto-mergeable
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Dependabot: check update-type
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
            if [ "$UPDATE_TYPE" = "version-update:semver-major" ]; then
              echo "mergeable=false" >> $GITHUB_OUTPUT
              echo "reason=major version bump requires manual review" >> $GITHUB_OUTPUT
            else
              echo "mergeable=true" >> $GITHUB_OUTPUT
            fi
          else
            # Renovate: check title for major
            if echo "$TITLE" | grep -qi "major\|breaking"; then
              echo "mergeable=false" >> $GITHUB_OUTPUT
              echo "reason=major/breaking change requires manual review" >> $GITHUB_OUTPUT
            else
              echo "mergeable=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Wait for CI
        if: steps.check.outputs.mergeable == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Wait up to 10 minutes for CI checks to complete
            const maxWait = 10 * 60 * 1000;
            const pollInterval = 30 * 1000;
            let elapsed = 0;

            while (elapsed < maxWait) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
              });

              const ciChecks = checks.check_runs.filter(
                c => c.name !== 'auto-merge' && c.name !== 'Auto-merge Dependencies'
              );

              if (ciChecks.length === 0) {
                console.log('No CI checks found yet, waiting...');
                await new Promise(r => setTimeout(r, pollInterval));
                elapsed += pollInterval;
                continue;
              }

              const allComplete = ciChecks.every(c => c.status === 'completed');
              const allSuccess = ciChecks.every(
                c => c.conclusion === 'success' || c.conclusion === 'skipped'
              );

              if (allComplete) {
                if (allSuccess) {
                  console.log(`All ${ciChecks.length} checks passed`);
                  return;
                } else {
                  const failed = ciChecks.filter(c => c.conclusion === 'failure');
                  core.setFailed(`CI failed: ${failed.map(c => c.name).join(', ')}`);
                  return;
                }
              }

              const pending = ciChecks.filter(c => c.status !== 'completed');
              console.log(`Waiting for ${pending.length} check(s): ${pending.map(c => c.name).join(', ')}`);
              await new Promise(r => setTimeout(r, pollInterval));
              elapsed += pollInterval;
            }

            core.setFailed('Timed out waiting for CI checks');

      - name: Auto-merge
        if: steps.check.outputs.mergeable == 'true'
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major
        if: steps.check.outputs.mergeable == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Manual review required**: ${{ steps.check.outputs.reason }}\n\n*Auto-merge skipped by DevOps-Factory*',
            });
